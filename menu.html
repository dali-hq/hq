<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Menu Ordering</title>
    <style>
        body { margin: 0; padding: 0; background: #000; overflow-x: hidden; }
        
        /* 鎖定圖片容器與比例 */
        .menu-container {
            position: relative;
            width: 100vw;
            max-width: 800px; /* 電腦版最大寬度限制 */
            margin: 0 auto;
            aspect-ratio: 1000 / 1414; /* A4 比例鎖定 */
        }

        .menu-img {
            width: 100%;
            display: block;
        }

        /* 熱點樣式：測試時可將透明度調高 */
        .hotspot {
            position: absolute;
            background: rgba(255, 255, 255, 0.01); 
            cursor: pointer;
            z-index: 10;
            -webkit-tap-highlight-color: transparent;
        }
        /* 按下時的視覺反饋 */
        .hotspot:active { background: rgba(0, 168, 134, 0.3); }

        /* 彈窗樣式 */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.75); z-index: 1000; backdrop-filter: blur(5px); }
        .modal { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; width: 85%; max-width: 320px; padding: 25px; border-radius: 20px; z-index: 1001;
            font-family: sans-serif;
        }
        .option-group { margin-bottom: 12px; }
        .option-group label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 0.9rem; color: #333; }
        select, input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; font-size: 1rem; box-sizing: border-box; }
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        .btn-send { flex: 2; background: #00a886; color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; font-size: 1rem; }
        .btn-cancel { flex: 1; background: #eee; border: none; padding: 15px; border-radius: 12px; color: #666; }
    </style>
</head>

<div class="modal-overlay" id="overlay" onclick="closeModal()"></div>
<div class="modal" id="orderModal">
    <h3 id="itemName" style="margin-top:0; color:#00a886;">品項名稱</h3>
    <div class="option-group">
        <label>大小</label>
        <select id="selSize"><option value="L">大杯 (L)</option><option value="M">中杯 (M)</option></select>
    </div>
    <div class="option-group">
        <label>甜度</label>
        <select id="selSugar"><option>正常甜</option><option>半糖</option><option>微糖</option><option>無糖</option></select>
    </div>
    <div class="option-group">
        <label>冰塊</label>
        <select id="selIce"><option>正常冰</option><option>少冰</option><option>微冰</option><option>去冰</option></select>
    </div>
    <div class="option-group">
        <label>訂購人名字</label>
        <input type="text" id="txtName" placeholder="請輸入名字">
    </div>
    <div class="option-group">
        <label>加料/備註</label>
        <input type="text" id="txtAddon" placeholder="例：加珍珠、不加粉粿">
    </div>
    <div class="btn-group">
        <button class="btn-cancel" onclick="closeModal()">取消</button>
        <button class="btn-send" id="submitBtn" onclick="submitToGas()">送出訂單</button>
    </div>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyknnFh63H_DWDOtWkCmh7TSMExAf_WgGGebmKOky6S3ROyD6YMN-35KGy0jpNrf2-sQg/exec"; // 請在此填入您的 GAS /exec 網址
    let currentItem = "";

    function popOrder(name) {
        currentItem = name;
        document.getElementById('itemName').innerText = name;
        document.getElementById('overlay').style.display = 'block';
        document.getElementById('orderModal').style.display = 'block';
    }

    function closeModal() {
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('orderModal').style.display = 'none';
    }

    async function submitToGas() {
        const name = document.getElementById('txtName').value;
        if(!name) return alert("請輸入名字！");

        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerText = "發送中...";

        const payload = {
            name,
            item: currentItem,
            size: document.getElementById('selSize').value,
            sugar: document.getElementById('selSugar').value,
            ice: document.getElementById('selIce').value,
            addon: document.getElementById('txtAddon').value
        };

        try {
            await fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            alert('點餐成功！');
            document.getElementById('txtAddon').value = "";
            closeModal();
        } catch (e) {
            alert('傳送失敗，請檢查網路。');
        } finally {
            btn.disabled = false;
            btn.innerText = "送出訂單";
        }
    }
</script>
