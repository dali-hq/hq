<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Order System</title>
    <style>
        /* 移除所有網頁元素，只留圖片 */
        html, body { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            background: #ffffff; 
            overflow-x: hidden;
            -webkit-user-select: none; /* 防止長按圖片跳出儲存清單 */
        }

        .menu-container {
            position: relative;
            width: 100vw;
            max-width: 1200px; /* 放大上限 */
            margin: 0 auto;
            aspect-ratio: 1000 / 1414; /* A4 比例鎖定 */
        }

        .menu-img {
            width: 100%;
            display: block;
        }

        /* 點擊熱點：測試時可將透明度從 0.01 改為 0.2 以看見紅格 */
        .hotspot {
            position: absolute;
            background: rgba(255, 0, 0, 0.01); 
            cursor: pointer;
            z-index: 10;
            -webkit-tap-highlight-color: transparent;
        }
        .hotspot:active { background: rgba(0, 168, 134, 0.3); }

        /* 彈窗樣式 */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; backdrop-filter: blur(4px); }
        .modal { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; width: 85%; max-width: 320px; padding: 25px; border-radius: 20px; z-index: 1001;
            font-family: -apple-system, "Microsoft JhengHei", sans-serif;
        }
        .modal h3 { margin: 0 0 15px 0; color: #00a886; font-size: 1.2rem; }
        .option-group { margin-bottom: 12px; }
        .option-group label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 0.9rem; color: #333; }
        select, input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; font-size: 1rem; box-sizing: border-box; }
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        .btn-send { flex: 2; background: #00a886; color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .btn-cancel { flex: 1; background: #eee; border: none; padding: 15px; border-radius: 12px; color: #666; cursor: pointer; }
    </style>
</head>

</div>

<div class="modal-overlay" id="overlay" onclick="closeModal()"></div>
<div class="modal" id="orderModal">
    <h3 id="itemName">品項名稱</h3>
    <div class="option-group">
        <label>容量</label>
        <select id="selSize"><option value="L">大杯 (L)</option><option value="M">中杯 (M)</option></select>
    </div>
    <div class="option-group">
        <label>甜度</label>
        <select id="selSugar"><option>正常甜</option><option>半糖</option><option>微糖</option><option>無糖</option></select>
    </div>
    <div class="option-group">
        <label>冰塊</label>
        <select id="selIce"><option>正常冰</option><option>少冰</option><option>微冰</option><option>去冰</option></select>
    </div>
    <div class="option-group">
        <label>訂購人</label>
        <input type="text" id="txtName" placeholder="請輸入姓名">
    </div>
    <div class="option-group">
        <label>備註/加料</label>
        <input type="text" id="txtAddon" placeholder="例如：加珍珠">
    </div>
    <div class="btn-group">
        <button class="btn-cancel" onclick="closeModal()">取消</button>
        <button class="btn-send" id="submitBtn" onclick="submitToGas()">確認點餐</button>
    </div>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyknnFh63H_DWDOtWkCmh7TSMExAf_WgGGebmKOky6S3ROyD6YMN-35KGy0jpNrf2-sQg/exec"; 
    let currentItem = "";

    function popOrder(name) {
        currentItem = name;
        document.getElementById('itemName').innerText = name;
        document.getElementById('overlay').style.display = 'block';
        document.getElementById('orderModal').style.display = 'block';
    }

    function closeModal() {
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('orderModal').style.display = 'none';
    }

    async function submitToGas() {
        const name = document.getElementById('txtName').value;
        if(!name) return alert("請輸入名字喔！");

        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerText = "傳送中...";

        const payload = {
            name,
            item: currentItem,
            size: document.getElementById('selSize').value,
            sugar: document.getElementById('selSugar').value,
            ice: document.getElementById('selIce').value,
            addon: document.getElementById('txtAddon').value
        };

        try {
            await fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            alert('點餐成功！');
            closeModal();
        } catch (e) {
            alert('傳送失敗');
        } finally {
            btn.disabled = false;
            btn.innerText = "確認點餐";
        }
    }
</script>

</body>
</html>
