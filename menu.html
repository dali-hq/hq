<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        .menu-container { position: relative; display: inline-block; width: 100%; max-width: 1000px; }
        .menu-image { width: 100%; display: block; }
        
        /* 點擊熱點示例：紅韻錫蘭紅 M 30 */
        .hotspot {
            position: absolute;
            background: rgba(255, 255, 255, 0.1); /* 平時透明，開發時可改紅色方便對位 */
            cursor: pointer;
            border-radius: 50%;
        }

        /* 簡單的彈出視窗 */
        #orderModal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; padding: 20px; border: 2px solid #00a886; z-index: 100; border-radius: 15px;
        }
        .btn-send { background: #00a886; color: white; padding: 10px; width: 100%; border: none; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>

<div class="menu-container">
    <img src="https://lh3.googleusercontent.com/d/1ReTbTVKA9ag7S_u6xu0gTp0X0F83ov-O" class="menu-image">
    
    <div class="hotspot" style="top: 17%; left: 24%; width: 3%; height: 2%;" onclick="openOrder('紅韻錫蘭紅', 'M')"></div>
    <div class="hotspot" style="top: 17%; left: 27%; width: 3%; height: 2%;" onclick="openOrder('紅韻錫蘭紅', 'L')"></div>
</div>

<div id="orderModal">
    <h3 id="modalTitle">品項名稱</h3>
    <label>甜度：</label>
    <select id="sugar"><option>正常甜</option><option>半糖</option><option>微糖</option><option>無糖</option></select><br><br>
    <label>冰塊：</label>
    <select id="ice"><option>正常冰</option><option>少冰</option><option>微冰</option><option>去冰</option></select><br><br>
    <label>加料備註：</label>
    <input type="text" id="addon" placeholder="如：加珍珠"><br>
    <button class="btn-send" onclick="sendToGAS()">確認送出單</button>
    <button onclick="closeModal()" style="border:none; background:none; color:grey;">取消</button>
</div>

<script>
    let currentItem = {};
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyknnFh63H_DWDOtWkCmh7TSMExAf_WgGGebmKOky6S3ROyD6YMN-35KGy0jpNrf2-sQg/exec";

    function openOrder(item, size) {
        currentItem = { item, size };
        document.getElementById('modalTitle').innerText = item + " (" + size + ")";
        document.getElementById('orderModal').style.display = 'block';
    }

    function closeModal() { document.getElementById('orderModal').style.display = 'none'; }

    function sendToGAS() {
        const payload = {
            ...currentItem,
            sugar: document.getElementById('sugar').value,
            ice: document.getElementById('ice').value,
            addon: document.getElementById('addon').value
        };

        fetch(GAS_URL, {
            method: 'POST',
            body: JSON.stringify(payload)
        }).then(() => {
            alert('點餐成功！資料已傳至 Google Sheet');
            closeModal();
        });
    }
</script>
</body>
</html>
