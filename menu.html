<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>萃泉茶飲 - 線上點餐</title>
    <style>
        :root { 
            --bg-light-blue: #e3f2fd; 
            --text-deep-blue: #0d47a1; 
            --header-black: #000000; 
            --tag-cyan: #4db6ac; 
        }

        body { font-family: "PingFang TC", "Noto Sans TC", sans-serif; background-color: var(--bg-light-blue); margin: 0; padding: 10px; color: var(--text-deep-blue); }
        .menu-wrapper { max-width: 1000px; margin: 0 auto; }
        
        .brand-header { text-align: center; margin-bottom: 15px; }
        .brand-header h1 { margin: 0; font-size: 1.5rem; color: var(--text-deep-blue); border-bottom: 2px solid var(--text-deep-blue); display: inline-block; }

        /* 緊湊網格 */
        .menu-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; align-items: start; }
        .category { margin-bottom: 15px; background: rgba(255,255,255,0.3); padding: 8px; border-radius: 10px; }
        
        /* 標題縮小 */
        .category-header { display: inline-block; background-color: var(--tag-cyan); padding: 3px 15px; border-radius: 50px; margin-bottom: 8px; }
        .category-name { font-size: 0.95rem; font-weight: bold; color: var(--header-black); }

        .item-list { list-style: none; padding: 0; margin: 0; }
        .item { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 6px 8px; /* 緊湊補白 */
            border-bottom: 1px solid rgba(13, 71, 161, 0.05); 
            cursor: pointer; transition: 0.2s; 
        }
        .item:hover { background: rgba(255, 255, 255, 0.6); border-radius: 5px; }
        .item-name { font-size: 0.9rem; font-weight: 500; }
        .item-prices { font-size: 0.8rem; opacity: 0.7; font-family: monospace; }

        /* 彈窗保持舒適感方便操作 */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; backdrop-filter: blur(2px); }
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; width: 85%; max-width: 320px; padding: 20px; border-radius: 15px; z-index: 1001; color: var(--text-deep-blue); }
        .option-group { margin-bottom: 12px; }
        .option-group label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 0.85rem; }
        select, input { width: 100%; padding: 10px; border: 1px solid #bbdefb; border-radius: 8px; font-size: 0.95rem; box-sizing: border-box; outline: none; color: var(--text-deep-blue); }
        
        .btn-group { display: flex; gap: 8px; margin-top: 15px; }
        .btn-send { flex: 2; background: var(--text-deep-blue); color: white; border: none; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .btn-cancel { flex: 1; background: #eee; border: none; padding: 12px; border-radius: 10px; color: #666; cursor: pointer; }

        @media (max-width: 850px) { .menu-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="menu-wrapper">
    <div class="brand-header"><h1>萃泉茶飲</h1></div>
    <div class="menu-grid" id="menuGrid"></div>
</div>

<div class="modal-overlay" id="overlay" onclick="closeModal()"></div>
<div class="modal" id="orderModal">
    <h3 id="itemName" style="margin:0 0 10px 0; font-size:1.2rem;">品項</h3>
    <div class="option-group">
        <label>容量</label>
        <input type="text" value="大杯 (L)" disabled style="background:#f9f9f9; color:#999;">
    </div>
    <div class="option-group">
        <label>甜度</label>
        <select id="selSugar"><option>無糖</option><option>微糖</option><option>半糖</option><option>少糖</option><option>正常甜</option></select>
    </div>
    <div class="option-group">
        <label>冰塊</label>
        <select id="selIce"><option>去冰</option><option>微冰</option><option>少冰</option><option>正常冰</option><option>熱飲</option></select>
    </div>
    <div class="option-group">
        <label>訂購人</label>
        <input type="text" id="txtName" placeholder="如何稱呼">
    </div>
    <div class="option-group">
        <label>備註/加料</label>
        <input type="text" id="txtAddon" placeholder="加珍珠/加椰果">
    </div>
    <div class="btn-group">
        <button class="btn-cancel" onclick="closeModal()">取消</button>
        <button class="btn-send" id="submitBtn" onclick="submitToGas()">送出</button>
    </div>
</div>

<script>
    const menuData = [
        { cat: "原茗 RAW TEA", items: [{n:"紅韻錫蘭紅", p:"35"}, {n:"初見茉莉綠", p:"35"}, {n:"焙香烏龍", p:"35"}, {n:"極萃金萱", p:"35"}, {n:"南投四季春", p:"35"}]},
        { cat: "奶后 MILK TEA", items: [{n:"萃泉奶茶", p:"55"}, {n:"花香奶綠", p:"55"}, {n:"厚焙烏龍奶", p:"55"}, {n:"蜜糖波霸奶", p:"60"}, {n:"金紫芋圓奶", p:"60"}, {n:"奶后私藏", p:"70"}]},
        { cat: "0% 咖啡因", items: [{n:"琥珀冬瓜茶", p:"35"}, {n:"冰釀蕎麥", p:"40"}, {n:"冰釀蕎麥拿鐵", p:"65"}, {n:"冰釀蕎麥雲朵", p:"65"}, {n:"沁桃粉霧", p:"65"}, {n:"梅壓力", p:"60"}, {n:"黑白配", p:"65"}]},
        { cat: "鮮乳 FRESH MILK", items: [{n:"紅韻錫蘭拿鐵", p:"65"}, {n:"茉莉花香拿鐵", p:"65"}, {n:"厚焙烏龍拿鐵", p:"65"}, {n:"蜜糖波霸紅韻拿鐵", p:"70"}, {n:"金紫芋圓紅韻拿鐵", p:"70"}, {n:"可可歐蕾", p:"70"}]},
        { cat: "雲朵奶蓋", items: [{n:"紅韻錫蘭奶蓋", p:"65"}, {n:"初見茉莉奶蓋", p:"65"}, {n:"厚焙烏龍奶蓋", p:"65"}, {n:"清香四季奶蓋", p:"65"}, {n:"極萃金萱奶蓋", p:"65"}]},
        { cat: "沁果 FRUIT TEA", items: [{n:"大坪頂百香綠", p:"60"}, {n:"百香檸檬綠", p:"65"}, {n:"萬丹甘蔗青", p:"65"}, {n:"蜜桃青青", p:"65"}, {n:"給點荔青", p:"70"}, {n:"荔刻烏龍", p:"70"}, {n:"百香雙重奏", p:"70"}]},
        { cat: "膩走開 GREASY", items: [{n:"鮮榨檸檬紅", p:"60"}, {n:"鮮榨檸檬綠", p:"60"}, {n:"鮮榨檸檬冬瓜", p:"60"}, {n:"鮮榨翡翠檸檬", p:"65"}]}
    ];

    const grid = document.getElementById('menuGrid');
    menuData.forEach(c => {
        let catHtml = `<div class="category"><div class="category-header"><span class="category-name">${c.cat}</span></div><ul class="item-list">`;
        c.items.forEach(i => {
            catHtml += `<li class="item" onclick="popOrder('${i.n}')"><span class="item-name">${i.n}</span><span class="item-prices">${i.p}</span></li>`;
        });
        catHtml += `</ul></div>`;
        grid.innerHTML += catHtml;
    });

    function popOrder(name) {
        document.getElementById('itemName').innerText = name;
        document.getElementById('overlay').style.display = 'block';
        document.getElementById('orderModal').style.display = 'block';
    }

    function closeModal() {
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('orderModal').style.display = 'none';
    }

    async function submitToGas() {
        const name = document.getElementById('txtName').value;
        if(!name) return alert("請輸入名字");
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerText = "傳送中...";
        const payload = {
            name, item: document.getElementById('itemName').innerText,
            size: "L", sugar: document.getElementById('selSugar').value,
            ice: document.getElementById('selIce').value,
            addon: document.getElementById('txtAddon').value
        };
        try {
            await fetch("https://script.google.com/macros/s/AKfycbyknnFh63H_DWDOtWkCmh7TSMExAf_WgGGebmKOky6S3ROyD6YMN-35KGy0jpNrf2-sQg/exec", { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            alert('點餐成功！');
            closeModal();
        } catch (e) { alert('連線失敗'); } finally { btn.disabled = false; btn.innerText = "送出"; }
    }
</script>
</body>
</html>
