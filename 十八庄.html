<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>實毅營造-行腳管理</title>
    <style>
        :root { --primary-red: #d32f2f; --bg-color: #fffcf5; }
        body { font-family: "Microsoft JhengHei", sans-serif; background: var(--bg-color); margin: 0; padding: 10px; font-size: 14px; }
        
        .box { max-width: 800px; margin: auto; background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-top: 6px solid var(--primary-red); overflow: hidden; }
        
        /* 置頂摘要區 - 更加緊湊 */
        .summary { 
            display: flex; justify-content: space-around; background: #fdf2f2; 
            padding: 10px; font-weight: bold; border-bottom: 1px solid #f9dcdc;
            position: sticky; top: 0; z-index: 100;
        }
        .sum-box { text-align: center; line-height: 1.2; }
        .sum-label { font-size: 11px; color: #666; }
        .sum-val { font-size: 15px; color: #333; }

        /* PC 表格樣式 */
        table { width: 100%; border-collapse: collapse; display: table; }
        th { background: #fafafa; padding: 10px; font-size: 12px; border-bottom: 1px solid #eee; }
        td { padding: 8px 4px; border-bottom: 1px solid #eee; text-align: center; }
        input { width: 85%; padding: 5px; border: 1px solid #ddd; border-radius: 4px; text-align: center; }
        .v-line { border-right: 1px solid #eee; }
        .subtotal { font-weight: bold; color: var(--primary-red); }

        /* --- 手機版極簡化 --- */
        @media screen and (max-width: 600px) {
            table { display: block; }
            thead { display: none; }
            tbody { display: block; }
            tr { 
                display: flex; flex-wrap: wrap; padding: 10px; 
                border-bottom: 1px solid #eee; align-items: center;
            }
            /* 第一列：名稱與金額（橫向並排） */
            td:nth-child(1) { order: 1; flex: 2; border: none; text-align: left; }
            td:nth-child(5) { order: 2; flex: 1; border: none; text-align: right; padding-right: 10px; }
            /* 第二列：計算詳情（縮小字體並排） */
            td:nth-child(2), td:nth-child(3), td:nth-child(4) { 
                order: 3; flex: 1; font-size: 12px; border: none; padding-top: 5px; color: #666;
            }
            /* 第三列：總量推算（醒目置底） */
            td:nth-child(6) { 
                order: 4; flex: 100%; border: none; text-align: left; 
                font-size: 12px; background: #fafafa; border-radius: 4px; margin-top: 5px; padding: 4px 8px;
            }
            
            input { width: 90%; font-size: 14px; padding: 4px; border: none; background: #f9f9f9; text-align: left; }
            input[type="number"] { text-align: center; border: 1px solid #eee; }
            
            td::before { content: attr(data-label); font-size: 10px; color: #999; display: block; margin-bottom: 2px; }
            td:nth-child(1)::before, td:nth-child(6)::before { display: none; } /* 名稱與總量不顯示標籤 */
        }
    </style>
</head>
<body>

<div class="box">
    <div class="summary">
        <div class="sum-box"><span class="sum-label">預算</span><span class="sum-val">14,000</span></div>
        <div class="sum-box"><span class="sum-label">支出</span><span id="total" class="sum-val">0</span></div>
        <div class="sum-box"><span class="sum-label">剩餘</span><span id="rem" class="sum-val" style="color:var(--primary-red)">14,000</span></div>
    </div>

    <table id="mainTable">
        <thead>
            <tr>
                <th width="30%">項目</th>
                <th width="10%">組數</th>
                <th width="12%">單價</th>
                <th width="10%">數量</th>
                <th width="15%" class="v-line">小計</th>
                <th width="23%">總量推算</th>
            </tr>
        </thead>
        <tbody id="list"></tbody>
    </table>
</div>

<script>
    const data = [
        ["寶礦利 580ml", 24, 462, 2, "瓶"],
        ["寶礦利(低卡)", 24, 462, 1, "瓶"],
        ["悅氏礦泉水 600ml", 24, 168, 2, "瓶"],
        ["Simple 純水 280ml", 24, 144, 2, "瓶"],
        ["綜合堅果隨手包", 1, 30, 120, "包"],
        ["名糖檸檬鹽糖", 1, 89, 3, "包"],
        ["BF薄荷岩鹽檸檬糖", 1, 62, 3, "包"],
        ["貝納頌經典拿鐵", 3, 75, 8, "瓶"],
        ["貝納頌榛果拿鐵", 3, 66, 4, "瓶"],
        ["清潔袋", 1, 42, 2, "卷"],
        ["聯翔鳳梨酥", 1, 30, 80, "個"],
        ["聯翔杏仁瓦片", 12, 336, 5, "包"],
        ["義美無糖豆奶", 24, 284, 1, "瓶"],
        ["原萃綠茶玉露", 4, 78, 4, "瓶"]
    ];

    function render() {
        let totalAll = 0;
        const tbody = document.getElementById('list');
        tbody.innerHTML = '';
        
        data.forEach((item, i) => {
            let sub = item[2] * item[3];
            totalAll += sub;
            let totalUnits = item[1] * item[3];
            let note = item[3] > 0 ? `👉 目前物資量：${totalUnits} ${item[4]}` : "-";
            
            tbody.innerHTML += `
                <tr>
                    <td class="text-left"><input type="text" value="${item[0]}" onchange="data[${i}][0]=this.value;render()"></td>
                    <td data-label="入數"><input type="number" value="${item[1]}" oninput="updateVal(${i}, 1, this.value)"></td>
                    <td data-label="單價"><input type="number" value="${item[2]}" oninput="updateVal(${i}, 2, this.value)"></td>
                    <td data-label="數量"><input type="number" value="${item[3]}" oninput="updateVal(${i}, 3, this.value)"></td>
                    <td data-label="小計" class="v-line"><span class="subtotal">${sub.toLocaleString()}</span></td>
                    <td><span style="color:#d32f2f; font-weight:bold;">${note}</span></td>
                </tr>`;
        });

        document.getElementById('total').innerText = totalAll.toLocaleString();
        let remain = 14000 - totalAll;
        document.getElementById('rem').innerText = remain.toLocaleString();
    }

    function updateVal(index, field, val) {
        data[index][field] = parseFloat(val) || 0;
        render();
    }
    render();
</script>
</body>
</html>
