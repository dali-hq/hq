<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>實毅營造-行腳物資管理</title>
    <style>
        :root { --primary-red: #d32f2f; --bg-color: #fffcf5; }
        body { font-family: "Microsoft JhengHei", sans-serif; background: var(--bg-color); margin: 0; padding: 10px; color: #333; }
        
        /* 容器與標題 */
        .box { max-width: 1000px; margin: auto; background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-top: 6px solid var(--primary-red); }
        h2 { text-align: center; color: var(--primary-red); margin: 10px 0 20px; font-size: 1.5rem; }

        /* 摘要欄固定在頂部 (手機很有用) */
        .summary { 
            display: flex; justify-content: space-around; background: #fdf2f2; 
            padding: 12px; margin-bottom: 20px; font-weight: bold; border-radius: 8px; 
            border: 1px solid #f9dcdc; position: sticky; top: 5px; z-index: 100;
        }
        .sum-box { text-align: center; }
        .sum-label { font-size: 12px; color: #666; display: block; }
        .sum-val { font-size: 16px; }

        /* 表格基礎樣式 */
        table { width: 100%; border-collapse: collapse; }
        th { background: #fafafa; color: #888; padding: 10px; font-size: 13px; border-bottom: 2px solid #eee; }
        td { padding: 10px 5px; border-bottom: 1px solid #eee; text-align: center; }
        
        input { width: 90%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; text-align: center; font-size: 16px; }
        input:focus { border-color: var(--primary-red); outline: none; background: #fffafa; }

        .text-left { text-align: left; }
        .text-right { text-align: right; padding-right: 15px; }
        .v-line { border-right: 2px solid #eee; }
        .subtotal { font-weight: bold; color: var(--primary-red); }
        .note-text { font-weight: bold; color: #2c3e50; }

        /* --- 手機版 RWD 樣式 --- */
        @media screen and (max-width: 600px) {
            thead { display: none; } /* 隱藏表頭 */
            tr { 
                display: block; margin-bottom: 15px; border: 1px solid #eee; 
                border-radius: 8px; padding: 10px; background: #fff; box-shadow: 2px 2px 5px rgba(0,0,0,0.05);
            }
            td { 
                display: flex; justify-content: space-between; align-items: center; 
                text-align: right; border-bottom: 1px dashed #eee; padding: 8px 5px;
            }
            td::before { content: attr(data-label); font-weight: bold; color: #888; font-size: 13px; }
            td:last-child { border-bottom: none; justify-content: center; background: #fffcf5; }
            input { width: 60%; text-align: right; }
            .v-line { border-right: none; }
            .text-left, .text-right { text-align: right; padding: 8px 5px; }
            .item-name-cell { background: #fdf2f2; border-radius: 5px 5px 0 0; }
            .item-name-cell input { width: 100%; font-weight: bold; text-align: left; border: none; background: transparent; }
        }
    </style>
</head>
<body>

<div class="box">
    <h2>🏮 行腳物資管理</h2>
    
    <div class="summary">
        <div class="sum-box"><span class="sum-label">預算</span><span class="sum-val">14,000</span></div>
        <div class="sum-box"><span class="sum-label">支出</span><span id="total" class="sum-val">0</span></div>
        <div class="sum-box"><span class="sum-label">剩餘</span><span id="rem" class="sum-val" style="color:var(--primary-red)">14,000</span></div>
    </div>

    <table>
        <thead>
            <tr>
                <th width="22%">項目名稱</th>
                <th width="10%">組數</th>
                <th width="12%">單價</th>
                <th width="10%">數量</th>
                <th width="18%" class="v-line">小計</th>
                <th width="28%">總量推算</th>
            </tr>
        </thead>
        <tbody id="list"></tbody>
    </table>
</div>

<script>
    const data = [
        ["寶礦利 580ml", 24, 462, 2, "瓶"],
        ["寶礦利(低卡) 580ml", 24, 462, 1, "瓶"],
        ["悅氏礦泉水 600ml", 24, 168, 2, "瓶"],
        ["Simple 純水 280ml", 24, 144, 2, "瓶"],
        ["綜合堅果隨手包", 1, 30, 120, "包"],
        ["名糖檸檬鹽糖", 1, 89, 3, "包"],
        ["BF薄荷岩鹽檸檬糖", 1, 62, 3, "包"],
        ["貝納頌經典拿鐵(3入)", 3, 75, 8, "瓶"],
        ["貝納頌榛果拿鐵(3入)", 3, 66, 4, "瓶"],
        ["家樂福環保垃圾袋", 1, 42, 2, "卷"],
        ["聯翔鳳梨酥", 1, 30, 80, "個"],
        ["聯翔杏仁瓦片", 12, 336, 5, "包"],
        ["義美無糖豆奶", 24, 284, 1, "瓶"],
        ["原萃綠茶玉露", 4, 78, 4, "瓶"]
    ];

    for (let i = 0; i < 5; i++) { data.push(["", 0, 0, 0, "個"]); }

    function render() {
        let totalAll = 0;
        const tbody = document.getElementById('list');
        tbody.innerHTML = '';
        
        data.forEach((item, i) => {
            let subtotal = item[2] * item[3];
            totalAll += subtotal;
            let totalUnits = item[1] * item[3];
            let noteContent = item[3] > 0 ? `共計 ${totalUnits} ${item[4]}` : "-";
            
            tbody.innerHTML += `
                <tr>
                    <td data-label="項目" class="item-name-cell"><input type="text" value="${item[0]}" onchange="data[${i}][0]=this.value;render()"></td>
                    <td data-label="組數"><input type="number" value="${item[1]}" oninput="updateVal(${i}, 1, this.value)"></td>
                    <td data-label="單價"><input type="number" value="${item[2]}" oninput="updateVal(${i}, 2, this.value)"></td>
                    <td data-label="數量"><input type="number" value="${item[3]}" oninput="updateVal(${i}, 3, this.value)"></td>
                    <td data-label="金額" class="text-right v-line"><span class="subtotal">${subtotal.toLocaleString()}</span></td>
                    <td data-label="總量"><span class="note-text">${noteContent}</span></td>
                </tr>`;
        });

        document.getElementById('total').innerText = totalAll.toLocaleString();
        let remain = 14000 - totalAll;
        let remEl = document.getElementById('rem');
        remEl.innerText = remain.toLocaleString();
        remEl.style.color = remain < 0 ? "red" : "#333";
    }

    function updateVal(index, field, val) {
        data[index][field] = parseFloat(val) || 0;
        render();
    }
    render();
</script>
</body>
</html>
