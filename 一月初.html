<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>一月初健康餐盒</title>
    <style>
        :root {
            --orange: #FF9800; --pink: #E91E63; --red: #D32F2F;
            --green: #006400; --gray: #e0e0e0;
        }
        body { font-family: "Microsoft JhengHei", sans-serif; background: #f8f9fa; padding: 20px; /* 核心置中語法 */ display: flex; flex-direction: column; align-items: center; }

/* 讓所有內容容器有一個最大寬度，避免在寬螢幕上拉得太開 */
.container { width: 100%; max-width: 900px; /* 您可以根據喜好調整這個寬度 */}

h1, .menu-link { text-align: center; }

/* 讓膠囊標頭在容器內填滿，且內容維持左對齊（但在置中的容器裡） */
.section-header { 
    width: 100%;
    display: flex; 
    align-items: center; 
    margin-top: 35px; 
    margin-bottom: 15px; 
}

/* 網格置中調整 */
.menu-grid { 
    width: 100%;
    display: flex; 
    flex-wrap: wrap; 
    gap: 12px; 
    margin-top: 15px; 
    margin-bottom: 30px; 
    justify-content: center; /* 讓餐點方塊在正中間排列 */
}
        body { font-family: "Microsoft JhengHei", sans-serif; background: #f8f9fa; padding: 20px; }
        
        .section-title-box { padding: 8px 25px; border-radius: 50px 0 0 50px; font-weight: bold; font-size: 22px; display: flex; align-items: center; white-space: nowrap; background-color: #fff; z-index: 2; }
        .section-bar { flex-grow: 1; height: 42px; border-radius: 0 50px 50px 0; margin-left: -10px; z-index: 1; opacity: 0.9; }

        .color-orange { color: var(--orange); border: 1px solid var(--orange); }
        .bg-orange-dark { background-color: #FFB74D; }
        .color-pink { color: var(--pink); border: 1px solid var(--pink); }
        .bg-pink-dark { background-color: #F06292; }
        .color-red { color: var(--red); border: 1px solid var(--red); }
        .bg-red-dark { background-color: #E57373; }

        
        .menu-item { background: white; padding: 10px 20px; border-radius: 50px; cursor: pointer; text-align: center; font-weight: bold; font-size: 22px; border: 1px solid transparent; display: inline-flex; align-items: center; justify-content: center; min-height: 42px; transition: 0.2s; }
        
        #light-share .menu-item { border-color: var(--orange); }
        #fresh-energy .menu-item { border-color: var(--pink); }
        #special-box .menu-item { border-color: var(--red); }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; }
        .modal-content { background: white; width: 90%; max-width: 400px; margin: 50px auto; padding: 25px; border-radius: 12px; }
        #selectedItemName { font-size: 28px; color: var(--red); font-weight: bold; margin-top: 0; padding-bottom: 10px; border-bottom: 1px solid #eee; }

        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        select, .user-name-input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        
        .btn-submit { width: 100%; padding: 12px; background: #28a745; color: white; border: none; border-radius: 6px; font-size: 18px; font-weight: bold; cursor: pointer; }
        .btn-cancel { width: 100%; padding: 12px; background: var(--gray); color: black; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; text-align: center; display: block; }
        .rice-option { margin-right: 10px; display: inline-block; cursor: pointer; }
    </style>
</head>
<body>
<div class="container">
        <h1>🍱 一月初健康餐盒</h1>
        <div style="text-align: center;">
    
    <a href="https://lh3.googleusercontent.com/d/1AvmLPM6kOiekJaOLIHFI8txWShy8blIN" target="_blank" class="menu-link">📋菜單</a>

    <div class="section-header">
        <div class="section-title-box color-orange">🔸 活力輕享</div>
        <div class="section-bar bg-orange-dark"></div>
    </div>
    <div class="menu-grid" id="light-share">
        <div class="menu-item" onclick="openModal('塔香三杯雞')">塔香三杯雞</div>
        <div class="menu-item" onclick="openModal('蒜泥白肉豬')">蒜泥白肉豬</div>
        <div class="menu-item" onclick="openModal('黑胡椒清蒸鯛魚')">黑胡椒清蒸鯛魚</div>
        <div class="menu-item" onclick="openModal('季節食蔬(素)')">季節食蔬(素)</div>
    </div>

    <div class="section-header">
        <div class="section-title-box color-pink">🥗 清爽元氣</div>
        <div class="section-bar bg-pink-dark"></div>
    </div>
    <div class="menu-grid" id="fresh-energy">
        <div class="menu-item" onclick="openModal('舒肥雞塔可飯')">舒肥雞塔可飯</div>
        <div class="menu-item" onclick="openModal('鯛魚塔可飯')">鯛魚塔可飯</div>
        <div class="menu-item" onclick="openModal('培根蝦塔可飯')">培根蝦塔可飯</div>
        <div class="menu-item" onclick="openModal('舒肥雞堅果沙拉')">舒肥雞堅果沙拉</div>
        <div class="menu-item" onclick="openModal('鮮蝦堅果沙拉')">鮮蝦堅果沙拉</div>
    </div>

    <div class="section-header">
        <div class="section-title-box color-red">🍱 特色盒餐</div>
        <div class="section-bar bg-red-dark"></div>
    </div>
    <div class="menu-grid" id="special-box">
        <div class="menu-item" onclick="openModal('舒肥嫩煮雞')">舒肥嫩煮雞</div>
        <div class="menu-item" onclick="openModal('日式唐揚雞')">日式唐揚雞</div>
        <div class="menu-item" onclick="openModal('泰式椒麻雞')">泰式椒麻雞</div>
        <div class="menu-item" onclick="openModal('宮保雞丁')">宮保雞丁</div>
        <div class="menu-item" onclick="openModal('薑汁燒肉豬')">薑汁燒肉豬</div>
        <div class="menu-item" onclick="openModal('香烤松阪豬')">香烤松阪豬</div>
        <div class="menu-item" onclick="openModal('日式照燒牛')">日式照燒牛</div>
        <div class="menu-item" onclick="openModal('川辣口水牛')">川辣口水牛 🌶️</div>
        <div class="menu-item" onclick="openModal('蔥爆牛柳')">蔥爆牛柳 🌶️</div>
        <div class="menu-item" onclick="openModal('照燒金磚魚')">照燒金磚魚</div>
        <div class="menu-item" onclick="openModal('清蒸鱸魚')">清蒸鱸魚</div>
        <div class="menu-item" onclick="openModal('舒肥嫩鮭魚')">舒肥嫩鮭魚</div>
    </div>

    <div id="orderModal" class="modal">
        <div class="modal-content">
            <h2 id="selectedItemName"></h2>
            <form id="orderForm">
                <input type="hidden" id="menuItem">
                
                <div class="form-group" id="flavorGroup" style="display:none;">
                    <label>口味選擇</label>
                    <select id="flavorSelection"></select>
                </div>

                <div class="form-group">
                    <label>訂購數量</label>
                    <select id="itemQuantity" onchange="updateNameFields()">
                        <option value="1">1</option><option value="2">2</option><option value="3">3</option>
                    </select>
                </div>

                <div class="form-group">
                    <label id="nameLabel">訂購人姓名</label>
                    <div id="nameFieldsContainer"></div>
                </div>

                <div class="form-group">
                    <label>飯量需求</label>
                    <label class="rice-option"><input type="radio" name="rice" value="紫米" checked> 紫米</label>
                    <label class="rice-option"><input type="radio" name="rice" value="白飯"> 白飯</label>
                    <label class="rice-option"><input type="radio" name="rice" value="紅藜麥飯"> 紅藜麥</label>
                    <label class="rice-option"><input type="radio" name="rice" value="飯少(8分)"> 飯少</label>
                    <label class="rice-option"><input type="radio" name="rice" value="飯一半"> 飯一半</label>
                </div>

                <button type="submit" class="btn-submit" id="submitBtn">確認送出</button>
                <button type="button" class="btn-cancel" onclick="closeModal()">取消返回</button>
            </form>
        </div>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbzkuKwCUf-9VLdkvqP53QE6DLp6LOngncKZaVgwNrphT4iQWTs6q2jm_2MOtEMk2QId/exec';

        function openModal(itemName) {
            document.getElementById('selectedItemName').innerText = itemName;
            document.getElementById('menuItem').value = itemName;
            document.getElementById('orderModal').style.display = 'block';
            
            // 口味邏輯
            const flavorGroup = document.getElementById('flavorGroup');
            const flavorSelect = document.getElementById('flavorSelection');
            flavorGroup.style.display = 'none';
            flavorSelect.innerHTML = '';

            if (itemName === '舒肥嫩煮雞') {
                flavorGroup.style.display = 'block';
                ['原味', '蜜汁烤肉醬', '鹹蛋黃塔塔', '椒鹽檸檬', '港式蔥鹽', '蒜香蜂蜜'].forEach(f => {
                    flavorSelect.add(new Option(f, f));
                });
            } else if (itemName === '日式唐揚雞') {
                flavorGroup.style.display = 'block';
                ['椒鹽', '松露醬', '桂花釀'].forEach(f => {
                    flavorSelect.add(new Option(f, f));
                });
            }

            document.getElementById('itemQuantity').value = "1";
            updateNameFields();
        }

        function closeModal() { document.getElementById('orderModal').style.display = 'none'; }
        window.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

        function updateNameFields() {
            const qty = document.getElementById('itemQuantity').value;
            const container = document.getElementById('nameFieldsContainer');
            container.innerHTML = '';
            for (let i = 0; i < qty; i++) {
                const input = document.createElement('input');
                input.type = 'text';
                input.className = 'user-name-input';
                input.placeholder = `請輸入姓名`;
                input.required = true;
                input.style.marginBottom = "8px";
                container.appendChild(input);
            }
        }

       document.getElementById('orderForm').onsubmit = function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerText = '傳送中...';

            const names = Array.from(document.querySelectorAll('.user-name-input')).map(el => el.value).join(', ');
            const qty = document.getElementById('itemQuantity').value;
            const item = document.getElementById('menuItem').value;
            const flavor = document.getElementById('flavorGroup').style.display === 'block' ? `(${document.getElementById('flavorSelection').value})` : '';
            const rice = document.querySelector('input[name="rice"]:checked').value;

            // 1. 建立參數字串 (這是 GAS 最穩的接收方式)
            const params = new URLSearchParams();
            params.append('name', names);
            params.append('item', `${item}${flavor} (x${qty})`);
            params.append('rice', rice);

            // 2. 執行傳送
            fetch(scriptURL, {
                method: 'POST',
                body: params, // 使用 URLSearchParams
                mode: 'no-cors' // 解決跨域攔截問題
            })
            .then(() => {
                // 注意：no-cors 模式下無法讀取回傳內容，只要沒噴 catch 就是成功
                alert('訂購指令已發出！請檢查試算表。');
                closeModal();
            })
            .catch(err => {
                console.error(err);
                alert('傳送失敗，請檢查網址或網路。');
            })
            .finally(() => {
                btn.disabled = false;
                btn.innerText = '確認送出';
            });
        };
    </script>
</body>
</html>
