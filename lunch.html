<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>食見生活-餐盒 (04/17午餐)</title>
  <style>
    /* 1. 全域字體強制設定，徹底解決細明體問題 */
    * {
        font-family: "Microsoft JhengHei", "PingFang TC", "Heiti TC", sans-serif !important;
        font-style: normal;
        box-sizing: border-box;
    }

    body { 
        max-width: 500px; 
        margin: 10px auto; 
        padding: 15px; 
        background-color: #f2f2f2; 
        line-height: 1.5;
    }

    /* 2. 標題與連結區塊 */
    h2 { 
        color: #2c3e50; 
        text-align: center; 
        font-size: 28px; /* 大標題 */
        margin-bottom: 20px; 
        border-bottom: 3px solid #e67e22;
        padding-bottom: 10px;
    }
    
    .menu-section { 
        margin-bottom: 25px; 
        display: flex; 
        justify-content: space-around; 
        background: #ffffff; 
        padding: 20px; 
        border-radius: 12px; 
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .menu-link { 
        text-decoration: none; 
        color: #d35400; 
        font-weight: bold; 
        font-size: 22px; /* 連結字體放大 */
    }

    /* 3. 訂單主容器 */
    .container { 
        background: white; 
        padding: 30px 20px; 
        border-radius: 15px; 
        box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
        border-top: 8px solid #e67e22;
    }
    
    /* 4. 欄位標籤 (名字、餐點等) */
    .form-group { margin-bottom: 25px; }
    
    label { 
        display: block; 
        margin-bottom: 12px; 
        font-weight: bold; 
        color: #2c3e50; 
        font-size: 22px; /* 標籤放大，方便閱讀 */
    }

    /* 5. 輸入框、下拉選單、多行文字框 */
    input, select, textarea { 
        width: 100%; 
        padding: 18px; /* 增加內距，格子變大很好點 */
        border: 2px solid #7f8c8d; /* 深色粗邊框，視覺更清晰 */
        border-radius: 12px; 
        font-size: 24px; /* 輸入字體大幅放大 */
        background-color: #fafafa;
        color: #000;
        outline: none;
        appearance: none; /* 移除行動裝置預設樣式 */
        -webkit-appearance: none;
    }

    /* 特別針對自填欄位做顏色區隔 */
    .custom-input { 
        border: 3px solid #e67e22; 
        background-color: #fffaf5; 
    }

    /* 修正 textarea 預設字體問題 */
    textarea {
        resize: none;
        overflow: hidden;
        min-height: 80px;
    }

    /* 6. 提交按鈕 - 超大、深色、好按 */
    button { 
        width: 100%; 
        padding: 20px; 
        background-color: #2c3e50; 
        color: white; 
        border: none; 
        border-radius: 12px; 
        font-size: 26px; 
        font-weight: bold; 
        cursor: pointer;
        box-shadow: 0 4px 0 #1a252f;
        margin-top: 10px;
    }

    button:active {
        transform: translateY(2px);
        box-shadow: 0 2px 0 #1a252f;
    }

    button:disabled { 
        background-color: #bdc3c7; 
        box-shadow: none;
    }
    
    /* 7. 狀態文字 */
    .status { 
        margin-top: 20px; 
        text-align: center; 
        font-weight: bold; 
        font-size: 20px; 
        min-height: 30px; 
    }

    /* 下拉選單內的群組標題 */
    optgroup { 
        font-size: 18px; 
        font-weight: bold;
    }
</style>
</head>
<body>

    <h2>食見生活-餐盒(04/17午餐)</h2>

    <div class="menu-section">
        <a href="https://lh3.googleusercontent.com/d/17wd1ItKC39-3tL27oEhPkx46F2Y-nWed" target="_blank" class="menu-link">
            <i>🍱</i> 菜單正面
        </a>
        <a href="https://lh3.googleusercontent.com/d/1YbIxfqbytDTd-oZuFGwGZXV8sXcohrQC" target="_blank" class="menu-link">
            <i>🌮</i> 菜單背面
        </a>
    </div>

    <div class="container">
        <div class="form-group">
            <label for="food">選擇餐點</label>
            <select id="food">
                <option value="">-- 請選擇餐點 --</option>
                    <optgroup label="【雙拼主餐區】">
                    <option value="酥嫩雙雞餐">酥嫩雙雞餐</option>
                    <option value="松阪翅客餐">松阪翅客餐</option>
                    <option value="特選豚牛餐">特選豚牛餐</option>
                    <option value="極炙鱸牛餐">極炙鱸牛餐</option>
                </optgroup>
                <optgroup label="【經典主餐區】">
                    <option value="蔥油手撕雞餐">蔥油手撕雞餐</option>
                    <option value="經典嫩雞胸餐">經典嫩雞胸餐</option>
                    <option value="紐奧良雞翅餐">紐奧良雞翅餐</option>
                    <option value="香草雞腿排餐">香草雞腿排餐</option>
                    <option value="嫩煎骰子牛餐">嫩煎骰子牛餐</option>
                    <option value="香烤松阪豬餐">香烤松阪豬餐</option>
                    <option value="秘製豬里肌餐">秘製豬里肌餐</option>
                    <option value="金焰烤鮭魚餐">金焰烤鮭魚餐</option>
                    <option value="香鱸魚卵片餐">香鱸魚卵片餐</option>
                </optgroup>
            </select>
        </div>

        <div class="form-group">
            <label for="name">名字</label>
            <input type="text" id="name" placeholder="請輸入名字" autocomplete="off">   
        </div>

        <div class="form-group">
            <label for="customFood">單點 / 自填項目</label>
            <input type="text" id="customFood" class="custom-input" placeholder="請填寫單點項目" autocomplete="off">            
        </div>

        <div class="form-group">
            <label for="note">特殊要求 (如：飯少、不辣)</label>
            <textarea id="note" rows="1" placeholder="若無可不填"></textarea>
        </div>

        <button onclick="sendOrder()" id="submitBtn">提交訂單</button>
        <div id="status" class="status"></div>
    </div>

<script>
    // ⚠️ 請在此填入您的 GAS 部署網址
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwde186cf7AX6ulnvfJ45TeLMDt_bzyCoAb7hGphCd4OlL6-11THjDBygom8k81mE5X/exec";

    function sendOrder() {
        const name = document.getElementById('name').value;
        const selectedFood = document.getElementById('food').value;
        const customFood = document.getElementById('customFood').value;
        const note = document.getElementById('note').value;
        const btn = document.getElementById('submitBtn');
        const status = document.getElementById('status');

        let finalFood = selectedFood;
        if (customFood) {
            // 如果有選大項又有填單點，會顯示：大項 (單點)
            finalFood = (selectedFood === "" || selectedFood === "單點/自填項目") ? customFood : selectedFood + " (" + customFood + ")";
        }

        if (!name || (!selectedFood && !customFood)) {
            alert("請輸入名字並選擇或填寫餐點內容！");
            return;
        }

        btn.disabled = true;
        status.innerText = "傳送中...";
        status.style.color = "#f39c12";

        const orderData = {
            user: name,
            food: finalFood,
            note: note
        };

        fetch(GAS_URL, {
            method: "POST",
            mode: "no-cors",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(orderData)
        })
        .then(() => {
            status.innerText = "✅ 訂購成功！資料已送出";
            status.style.color = "#27ae60";
            document.getElementById('name').value = "";
            document.getElementById('food').value = "";
            document.getElementById('customFood').value = "";
            document.getElementById('note').value = "";
        })
        .catch(err => {
            status.innerText = "❌ 提交失敗，請檢查網路";
            status.style.color = "#c0392b";
        })
        .finally(() => {
            btn.disabled = false;
        });
    }
</script>

</body>
</html>
