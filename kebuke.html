<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>可不可點餐系統</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding-bottom: 100px; }
        .category-header { background-color: #003d46; color: white; padding: 10px; margin-top: 20px; border-radius: 5px; }
        .menu-item { background: white; border-bottom: 1px solid #dee2e6; padding: 15px 10px; }
        .cart-summary { position: fixed; bottom: 0; left: 0; right: 0; background: #003d46; color: white; padding: 15px; text-align: center; }
    </style>
</head>
<body>

<div class="container mt-4">
    <h2 class="text-center mb-4">🥤 可不可熟成紅茶 點餐單</h2>
    
    <div id="menu-container">
        </div>
</div>

<div class="cart-summary">
    <button class="btn btn-warning fw-bold" onclick="generateOrder()">生成訂單文字 (複製至 LINE)</button>
</div>

<script>
    const menuData = [
        { category: "乎乾 好茶", items: ["熟成紅茶", "麗春紅茶", "烏米紅茶", "春芽綠茶", "胭脂紅茶"] },
        { category: "乎乾 鮮奶茶", items: ["熟成歐蕾", "冷露歐蕾", "金蜜歐蕾", "胭脂歐蕾", "白玉歐蕾", "鴛鴦歐蕾", "熟成榛果歐蕾", "墨玉鴛鴦歐蕾"] },
        { category: "乎乾 奶茶", items: ["熟成奶茶", "春芽奶茶", "胭脂奶茶", "白玉奶茶"] },
        { category: "乎乾 冬瓜 (無咖啡因)", items: ["雪花冷露", "熟成冷露", "春芽冷露", "胭脂冷露", "檸檬冷露"] },
        { category: "乎乾 手作", items: ["熟檸紅茶", "春檸綠茶", "春梅冰茶", "太妃熟成", "金蜜熟成", "胭脂多多"] }
    ];

    const sugarLevels = ["無糖", "一分糖", "微糖", "半糖", "少糖", "全糖"];
    const iceLevels = ["去冰", "微冰", "少冰", "正常冰", "常溫", "熱"];

    const container = document.getElementById('menu-container');

    menuData.forEach(cat => {
        let html = `<div class="category-header"><h4>${cat.category}</h4></div>`;
        cat.items.forEach(item => {
            html += `
            <div class="menu-item row align-items-center">
                <div class="col-md-3 fw-bold">${item}</div>
                <div class="col-md-3">
                    <select class="form-select form-select-sm item-sugar">
                        ${sugarLevels.map(s => `<option value="${s}">${s}</option>`).join('')}
                    </select>
                </div>
                <div class="col-md-3">
                    <select class="form-select form-select-sm item-ice">
                        ${iceLevels.map(i => `<option value="${i}">${i}</option>`).join('')}
                    </select>
                </div>
                <div class="col-md-3 d-flex align-items-center">
                    <input type="number" class="form-control form-control-sm item-qty" placeholder="數量" min="0" value="0" style="width: 70px;">
                    <span class="ms-2">杯</span>
                </div>
            </div>`;
        });
        container.innerHTML += html;
    });

    function generateOrder() {
        let orderText = "📋 我的可不可訂單：\n";
        const items = document.querySelectorAll('.menu-item');
        let hasOrder = false;

        items.forEach(el => {
            const name = el.querySelector('.fw-bold').innerText;
            const sugar = el.querySelector('.item-sugar').value;
            const ice = el.querySelector('.item-ice').value;
            const qty = el.querySelector('.item-qty').value;

            if (parseInt(qty) > 0) {
                orderText += `- ${name} (${sugar}/${ice}) x ${qty}杯\n`;
                hasOrder = true;
            }
        });

        if (!hasOrder) {
            alert("請至少選擇一杯飲料！");
            return;
        }

        navigator.clipboard.writeText(orderText).then(() => {
            alert("訂單已複製到剪貼簿！\n\n" + orderText);
        });
    }
</script>

</body>
</html>
